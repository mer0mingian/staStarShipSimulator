{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}
{% block header %}{{ title }}{% endblock %}

{% block content %}
<div class="panel" style="border-color: var(--lcars-orange); text-align: center; padding: 40px;">
    <h2 style="color: var(--lcars-orange); margin-bottom: 20px;">
        ⚠️ {{ message }}
    </h2>
    
    <div style="text-align: left; max-width: 600px; margin: 30px auto; padding: 20px; border: 2px solid var(--lcars-purple); border-radius: 10px;">
        <h3 style="color: var(--lcars-purple); margin-bottom: 15px;">Migration Guide:</h3>
        <ol style="line-height: 2; color: var(--lcars-tan);">
            {% for step in migration_guide %}
            <li>{{ step }}</li>
            {% endfor %}
        </ol>
    </div>
    
    <a href="{{ back_url }}" class="btn" style="background: var(--lcars-purple); margin-top: 20px;">
        ← Back
    </a>
</div>
{% endblock %}
